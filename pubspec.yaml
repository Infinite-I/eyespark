name: assist_navigation_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  provider: ^6.1.2

  # Bluetooth
  flutter_blue_plus: ^1.32.8

  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # TTS
  flutter_tts: ^4.0.2

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.7

  # Location
  geolocator: ^10.1.0

  # Audio
  audioplayers: ^5.2.1

  # Charts
  fl_chart: ^0.66.0

  # Sensors
  sensors_plus: ^4.0.2

  # Sharing
  share_plus: ^7.2.0

  # PDF
  pdf: ^3.10.7

  # ESP32-CAM
  http: ^1.1.0

  # PDF Printing
  printing: ^5.11.1
  open_file: ^3.3.2

  # Voice Commands - SOLUTION: Mettre à jour vers la version compatible
  speech_to_text: ^7.0.0  # Changé de 6.6.0 à 7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/